# =============================================================================
# Railway.app Deployment Configuration — INFORMATIV Pilot
# =============================================================================
#
# Deploys the INFORMATIV FastAPI server on Railway with:
#   - Auto-HTTPS with custom domain support
#   - Docker-based build from deployment/Dockerfile
#   - Health check on /health
#   - Managed Redis (add as Railway service)
#
# Setup:
#   1. Install Railway CLI: npm i -g @railway/cli
#   2. Login: railway login
#   3. Create project: railway init
#   4. Add Redis: railway add --plugin redis
#   5. Set env vars: railway variables set KEY=VALUE
#   6. Deploy: railway up
#
# =============================================================================

[build]
builder = "NIXPACKS"

[deploy]
# CRITICAL: workers MUST be 1. ThompsonSampler, GraphIntelligenceCache,
# _ARCHETYPE_MECHANISM_PRIORS, and BuyerUncertaintyProfiles are
# process-local singletons. Multi-worker deployment silently breaks
# the learning loop — cache invalidations and posterior updates only
# affect the worker that processes them. See adam/main.py lifespan
# guardrail for details.
startCommand = "uvicorn adam.main:create_app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 30 --timeout-graceful-shutdown 10"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
