    // Post-render: fix inline colors in light sections
    function fixLightSections() {
      document.querySelectorAll('.light-section').forEach(section => {
        // Map of dark colors to light equivalents (rgb format from React inline styles)
        const textMap = [
          ['rgb(232, 237, 245)', '#2a2e3a'],   // COLORS.text
          ['rgb(122, 139, 168)', '#5a6070'],   // COLORS.textDim
        ];
        
        // Fix text colors on all text-bearing elements
        section.querySelectorAll('div, span, p').forEach(el => {
          const color = el.style.color;
          for (const [from, to] of textMap) {
            if (color === from) { el.style.color = to; break; }
          }
        });
        
        // Fix background colors
        section.querySelectorAll('div').forEach(el => {
          const bg = el.style.background || el.style.backgroundColor || '';
          // Solid dark card backgrounds
          if (bg.includes('rgb(10, 14, 23)') || bg === 'rgb(10, 14, 23)') {
            el.style.background = 'rgba(255,255,255,0.7)';
            el.style.boxShadow = '0 2px 16px rgba(0,0,0,0.04)';
          }
          // Solid dark page backgrounds  
          if (bg.includes('rgb(6, 8, 13)') || bg === 'rgb(6, 8, 13)') {
            el.style.background = 'rgba(250,248,244,0.9)';
          }
          // Dark gradient backgrounds on inner cards
          if (bg.includes('linear-gradient') && (bg.includes('rgb(6, 8, 13)') || bg.includes('rgb(10, 14, 23)'))) {
            el.style.background = 'rgba(255,255,255,0.5)';
          }
          
          // Fix borders
          const bc = el.style.borderColor;
          if (bc === 'rgb(26, 36, 64)') {
            el.style.borderColor = 'rgba(0,0,0,0.08)';
          }
          // Check border shorthand
          const b = el.style.border;
          if (b && b.includes('rgb(26, 36, 64)')) {
            el.style.border = b.replace(/rgb\(26,\s*36,\s*64\)/g, 'rgba(0,0,0,0.08)');
          }
        });
        
        // Also handle hex colors with alpha (e.g., COLORS.textDim + "88" → #7a8ba888)
        section.querySelectorAll('div, span').forEach(el => {
          const c = el.style.color;
          // Handle rgba versions of textDim with reduced opacity
          if (c && (c.includes('122, 139, 168') || c.includes('232, 237, 245'))) {
            const isDim = c.includes('122, 139, 168');
            const alpha = c.match(/[\d.]+\)$/);
            if (alpha) {
              el.style.color = isDim ? `rgba(90, 96, 112, ${alpha[0]}` : `rgba(42, 46, 58, ${alpha[0]}`;
            } else {
              el.style.color = isDim ? '#5a6070' : '#2a2e3a';
            }
          }
        });
        section.querySelectorAll('line, path').forEach(el => {
          const stroke = el.getAttribute('stroke');
          if (stroke === '#111b2e' || stroke === 'rgb(17, 27, 46)') el.setAttribute('stroke', 'rgba(0,0,0,0.08)');
          if (stroke === '#1a2440' || stroke === 'rgb(26, 36, 64)') el.setAttribute('stroke', 'rgba(0,0,0,0.12)');
        });
        section.querySelectorAll('text').forEach(el => {
          const fill = el.getAttribute('fill');
          if (fill === '#7a8ba8' || fill === 'rgb(122, 139, 168)') el.setAttribute('fill', '#5a6070');
        });
      });
    }
    // Run after React renders
    setTimeout(fixLightSections, 100);
