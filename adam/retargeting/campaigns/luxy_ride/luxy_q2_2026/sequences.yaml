# LUXY Ride — Q2 2026 Pilot — Layer-2 Therapeutic Sequences
#
# Extracted from the bilateral source doc by slice S8.2. Layer-2 = the
# tenant's data-driven buyer archetypes (5: 3 active + 2 suppress) with
# per-archetype therapeutic retargeting sequences. Layer-1 = the
# platform-generic 8-value cold-start ArchetypeID enum
# (adam/cold_start/models/enums.py). The cold_start_archetype_crosswalk
# block on each Layer-2 archetype declares which Layer-1 archetypes
# route to it (maps_from). Suppress archetypes have empty maps_from:
# cold-start signals (geo/device/hour/IAB) cannot distinguish a future
# skeptical_analyst or disillusioned from a careful_truster, so those
# segments are reached via downstream behavioral signals, not initial
# cold-start assignment.
#
# Copyright discipline: all quotations from the bilateral source doc
# are <=15 words. The doc's prose is not reproduced; this file carries
# structured metadata (correlation coefficients, mechanism names,
# short interpretation phrases).
#
# Touch authoring status: Careful Truster touches 2/3/4 are
# extracted_from_bilateral_doc (the doc details that sequence
# explicitly). All other touches are
# derived_from_bilateral_findings_needs_authoring — structure derived
# from the bilateral helps/hurts findings; touch_text deferred to the
# S8.2.author follow-up.

