<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM | Campaign Intelligence</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header class="header">
        <div class="header-brand">ADAM</div>
        <div class="header-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting</span>
        </div>
    </header>

    <main class="main">
        <!-- Input Panel -->
        <aside class="input-panel">
            <h1 class="panel-title">Campaign Input</h1>

            <form class="campaign-form" id="campaign-form">
                <div class="form-group">
                    <label for="brand_name">Brand</label>
                    <input type="text" id="brand_name" placeholder="e.g., Lululemon" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="product_name">Product</label>
                    <input type="text" id="product_name" placeholder="e.g., Align Hi-Rise Pant" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2" placeholder="What makes this product special?"></textarea>
                </div>

                <div class="form-group">
                    <label for="call_to_action">Call to Action</label>
                    <input type="text" id="call_to_action" placeholder="e.g., Shop now at lululemon.com" autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Product Categories <span class="hint">(select all that apply)</span></label>
                    <div class="category-list" id="product_category">
                        <p class="category-placeholder">Enter brand name to see categories</p>
                    </div>
                    <p class="form-note" id="category-status"></p>
                </div>

                <details class="advanced-options">
                    <summary>Advanced Options</summary>
                    <div class="advanced-content">
                        <div class="form-group">
                            <label for="product_url">Product URL</label>
                            <input type="text" id="product_url" placeholder="https://amazon.com/dp/..." autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="target_audience">Custom Audience</label>
                            <input type="text" id="target_audience" placeholder="e.g., Fitness enthusiasts" autocomplete="off">
                        </div>
                    </div>
                </details>

                <button type="submit" class="btn-analyze" id="analyze-btn">Analyze Campaign</button>
            </form>
        </aside>

        <!-- Results Panel -->
        <section class="results-panel" id="results-panel">
            <div class="results-empty" id="results-empty">
                <p>Enter campaign details to get your ad recommendation.</p>
            </div>

            <div class="results-loading" id="results-loading" style="display: none;">
                <p>Analyzing...</p>
            </div>

            <div class="results-content" id="results-content" style="display: none;">
                <!-- Populated by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <span>ADAM Platform</span>
        <span id="processing-time"></span>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
