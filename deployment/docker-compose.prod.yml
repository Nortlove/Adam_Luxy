version: '3.8'

# =============================================================================
# INFORMATIV Production Stack — LUXY Ride Pilot
# =============================================================================
#
# This runs: API server + Redis
# Neo4j runs separately (local install, Aura cloud, or add service below)
#
# Usage:
#   cd deployment/
#   cp .env.production .env   # Edit with real values
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Endpoints after startup:
#   http://localhost:8000/health/ready     — Health check
#   http://localhost:8000/api/v1/signals/  — Nonconscious signal API
#   http://localhost:8000/api/v1/stackadapt/ — StackAdapt integration
#   http://localhost:8000/metrics           — Prometheus metrics
#   http://localhost:8000/static/telemetry/informativ.js — Telemetry script
# =============================================================================

services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      # Override Redis host to use Docker service name
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    networks:
      - informativ

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - informativ

  # Uncomment if running Neo4j in Docker (otherwise connect to external/Aura)
  # neo4j:
  #   image: neo4j:5-community
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     - NEO4J_AUTH=neo4j/your-password-here
  #     - NEO4J_PLUGINS=["apoc"]
  #     - NEO4J_dbms_memory_heap_initial__size=512m
  #     - NEO4J_dbms_memory_heap_max__size=2G
  #   volumes:
  #     - neo4j_data:/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5
  #   restart: unless-stopped
  #   networks:
  #     - informativ

networks:
  informativ:
    driver: bridge

volumes:
  redis_data:
  # neo4j_data:
