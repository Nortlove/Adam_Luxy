# INFORMATIV Production Nginx Configuration
# Reverse proxy for FastAPI + SSL termination

upstream informativ {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name informativ.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name informativ.yourdomain.com;

    # SSL (use certbot/letsencrypt)
    ssl_certificate /etc/letsencrypt/live/informativ.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/informativ.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Timeouts — critical for programmatic speed
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 30s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    # StackAdapt webhook endpoint — highest priority
    location /api/v1/stackadapt/webhook {
        proxy_pass http://informativ;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No buffering for webhooks — process immediately
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Decision/intelligence API — latency-critical
    location /api/v1/ {
        proxy_pass http://informativ;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health + metrics — no auth required
    location /health {
        proxy_pass http://informativ;
    }

    location /metrics {
        proxy_pass http://informativ;
        # Restrict to internal/monitoring IPs
        # allow 10.0.0.0/8;
        # deny all;
    }

    # Docs — development only, disable in production
    location /docs {
        proxy_pass http://informativ;
    }

    location /redoc {
        proxy_pass http://informativ;
    }
}
